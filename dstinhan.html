            { id: 22, title: "Bài 23. CHUẨN BỊ XÂY DỰNG TRANG WEB", q: "Câu 12. Các bước quan trọng xây dựng trang web:", options: [
                { id: 'a', text: "Định hình ý tưởng gồm xác định mục đích, đối tượng và yêu cầu trang web.", isTrue: true },
                { id: 'b', text: "Thiết kế mỹ thuật chỉ tập trung vào việc chọn màu và phông chữ.", isTrue: false },
                { id: 'c', text: "Có thể dùng các công cụ miễn phí như Google Sites để làm web.", isTrue: true },
                { id: 'd', text: "Chuẩn bị tư liệu chỉ gồm thiết kế favicon và logo.", isTrue: false }
            ]},
            { id: 23, title: "Bài 24. XÂY DỰNG PHẦN ĐẦU TRANG WEB", q: "Câu 11. Giao diện chính của Google Sites:", options: [
                { id: 'a', text: "Phần trên cùng chứa ô tìm kiếm và biểu tượng ứng dụng Google.", isTrue: true },
                { id: 'b', text: "Phần thứ hai chứa danh sách các trang người dùng đã mở trước đó.", isTrue: true },
                { id: 'c', text: "Phần thứ ba cung cấp tùy chọn tạo trang web mới (trống hoặc mẫu).", isTrue: true },
                { id: 'd', text: "Phần thứ ba chứa toàn bộ các chức năng thiết lập phần Header.", isTrue: false }
            ]},
            { id: 24, title: "Bài 24. XÂY DỰNG PHẦN ĐẦU TRANG WEB", q: "Câu 12. Chức năng trên giao diện tạo trang web Google Sites:", options: [
                { id: 'a', text: "Dòng 'Nhập tên trang web' dùng để nhập logo và favicon.", isTrue: false },
                { id: 'b', text: "Dòng 'Thay đổi hình ảnh' dùng để chọn kiểu bìa hoặc biểu ngữ.", isTrue: false },
                { id: 'c', text: "Dòng 'Tiêu đề trang' dùng để nhập tên tệp lưu trữ trang web.", isTrue: false },
                { id: 'd', text: "Dòng 'Trang web không có tiêu đề' cho phép nhập tiêu đề trang.", isTrue: true }
            ]},
            { id: 25, title: "Bài 25. XÂY DỰNG PHẦN THÂN VÀ CHÂN TRANG", q: "Câu 11. Đánh giá về dự án trang web lớp 12A:", options: [
                { id: 'a', text: "Bảng chọn Chèn chỉ chứa các lệnh để chèn văn bản.", isTrue: false },
                { id: 'b', text: "Lệnh 'Drive' cho phép chèn thông tin từ Google Drive vào trang web.", isTrue: true },
                { id: 'c', text: "Bảng chọn Trang được sử dụng để thêm các khối nội dung vào trang.", isTrue: false },
                { id: 'd', text: "Lệnh 'Nhúng' có thể chèn dữ liệu từ các ứng dụng Internet khác.", isTrue: true }
            ]},
            { id: 26, title: "Bài 25. XÂY DỰNG PHẦN THÂN VÀ CHÂN TRANG", q: "Câu 12. Thiết kế trang web 'Ngày hội STEM':", options: [
                { id: 'a', text: "Nhóm lệnh đầu của bảng Chèn gồm Hộp văn bản, Hình ảnh, Drive, Nhúng.", isTrue: true },
                { id: 'b', text: "Để chia trang hai cột, dùng biểu tượng khối trong Thành phần nội dung.", isTrue: true },
                { id: 'c', text: "Nhóm lệnh thứ ba trong bảng chọn Chèn không chứa lệnh YouTube.", isTrue: false },
                { id: 'd', text: "Có thể chỉnh kích thước và di chuyển đối tượng bằng cách kéo thả.", isTrue: true }
            ]}
        ];

        let pendingIndices = [...Array(originalData.length).keys()];
        let currentIndexInPending = 0;
        let userChoices = {};
        let mode = 'selection'; 
        const totalQuestions = originalData.length;

        function renderQuestion() {
            const container = document.getElementById('quiz-container');
            if (pendingIndices.length === 0) {
                showCompletion();
                return;
            }

            const actualIdx = pendingIndices[currentIndexInPending];
            const item = originalData[actualIdx];
            
            let html = `
                <div class="bg-white rounded-3xl p-6 md:p-10 shadow-xl border border-slate-100 animate-in">
                    <div class="flex items-center gap-3 mb-6">
                        <span class="px-3 py-1 bg-blue-50 text-blue-600 text-[10px] font-black uppercase tracking-tighter rounded-lg border border-blue-100">${item.title}</span>
                    </div>
                    <h2 class="text-xl md:text-2xl font-bold text-slate-800 leading-snug mb-10">${item.q}</h2>
                    <div class="space-y-6">
            `;

            item.options.forEach(opt => {
                const choice = userChoices[opt.id];
                const isChecked = mode === 'result';
                
                let trueBtnClass = "choice-btn flex-1 py-3 px-4 rounded-xl font-bold text-sm border-2 transition-all ";
                let trueIcon = "";
                let falseBtnClass = "choice-btn flex-1 py-3 px-4 rounded-xl font-bold text-sm border-2 transition-all ";
                let falseIcon = "";

                if (!isChecked) {
                    trueBtnClass += choice === true ? "btn-selected" : "bg-white border-slate-100 text-slate-400 hover:border-blue-200 hover:text-blue-500";
                    falseBtnClass += choice === false ? "btn-selected" : "bg-white border-slate-100 text-slate-400 hover:border-blue-200 hover:text-blue-500";
                } else {
                    const isUserCorrect = choice === opt.isTrue;
                    
                    if (choice === true) {
                        trueBtnClass += isUserCorrect ? "result-correct" : "result-wrong";
                        trueIcon = isUserCorrect ? "✅ " : "❌ ";
                    } else {
                        trueBtnClass += "bg-slate-50 border-slate-100 text-slate-300 opacity-50";
                    }

                    if (choice === false) {
                        falseBtnClass += isUserCorrect ? "result-correct" : "result-wrong";
                        falseIcon = isUserCorrect ? "✅ " : "❌ ";
                    } else {
                        falseBtnClass += "bg-slate-50 border-slate-100 text-slate-300 opacity-50";
                    }

                    if (opt.isTrue) {
                        trueBtnClass += " truth-outline";
                        trueIcon = (choice === true ? trueIcon : "⭐ ") ;
                    } else {
                        falseBtnClass += " truth-outline";
                        falseIcon = (choice === false ? falseIcon : "⭐ ") ;
                    }
                }

                html += `
                    <div class="space-y-3">
                        <div class="text-sm font-semibold text-slate-700 flex items-start gap-2">
                            <span class="text-blue-500 mt-0.5 font-black">${opt.id.toUpperCase()}.</span>
                            <span>${opt.text}</span>
                        </div>
                        <div class="flex gap-4">
                            <button onclick="selectOption('${opt.id}', true)" ${isChecked ? 'disabled' : ''} class="${trueBtnClass}">
                                ${opt.isTrue && isChecked ? '<span class="truth-label">Đúng thực tế</span>' : ''}
                                ${trueIcon} Đúng
                            </button>
                            <button onclick="selectOption('${opt.id}', false)" ${isChecked ? 'disabled' : ''} class="${falseBtnClass}">
                                ${!opt.isTrue && isChecked ? '<span class="truth-label">Sai thực tế</span>' : ''}
                                ${falseIcon} Sai
                            </button>
                        </div>
                    </div>
                `;
            });

            html += `</div></div>`;
            container.innerHTML = html;
            updateUIState();
        }

        function updateUIState() {
            document.getElementById('remaining-count').innerText = pendingIndices.length;
            const progress = ((totalQuestions - pendingIndices.length) / totalQuestions) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;

            const btn = document.getElementById('action-btn');
            const btnText = document.getElementById('btn-text');
            const hint = document.getElementById('hint-text');

            if (mode === 'selection') {
                btnText.innerText = "Kiểm tra đáp án";
                btn.className = "group relative w-full md:w-80 py-4 bg-slate-900 text-white font-bold rounded-2xl shadow-xl hover:bg-blue-600 active:scale-95 transition-all";
                hint.innerText = "Chọn Đúng/Sai cho tất cả 4 ý trên.";
            } else {
                btnText.innerText = "Tiếp tục bài học";
                btn.className = "group relative w-full md:w-80 py-4 bg-blue-600 text-white font-bold rounded-2xl shadow-xl hover:bg-slate-900 active:scale-95 transition-all";
                hint.innerText = "✅: Khớp | ❌: Sai | ⭐: Đáp án hệ thống";
            }
        }

        window.selectOption = (optId, val) => {
            userChoices[optId] = val;
            renderQuestion();
        }

        function handleAction() {
            if (mode === 'selection') {
                if (Object.keys(userChoices).length < 4) {
                    alert("Bạn cần hoàn thành cả 4 ý (a, b, c, d) trước!");
                    return;
                }
                mode = 'result';
                renderQuestion();
            } else {
                const actualIdx = pendingIndices[currentIndexInPending];
                const item = originalData[actualIdx];
                let isPerfect = true;
                item.options.forEach(o => {
                    if (userChoices[o.id] !== o.isTrue) isPerfect = false;
                });

                if (isPerfect) {
                    pendingIndices.splice(currentIndexInPending, 1);
                } else {
                    const failedIdx = pendingIndices.splice(currentIndexInPending, 1)[0];
                    pendingIndices.push(failedIdx);
                }

                if (currentIndexInPending >= pendingIndices.length) currentIndexInPending = 0;
                userChoices = {};
                mode = 'selection';
                renderQuestion();
            }
        }

        function showCompletion() {
            document.getElementById('quiz-container').innerHTML = '';
            document.getElementById('action-btn').parentElement.classList.add('hidden');
            document.getElementById('completion-screen').classList.remove('hidden');
            document.getElementById('progress-bar').style.width = `100%`;
        }

        renderQuestion();
    </script>
